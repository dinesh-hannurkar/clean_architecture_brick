include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false
  errors:
    invalid_annotation_target: ignore
    missing_required_param: error
    missing_return: error
    must_be_immutable: error
    
linter:
  rules:
    # Architecture Enforcement
    always_declare_return_types: true
    avoid_classes_with_only_static_members: false # Allow for use case classes
    prefer_final_fields: true
    prefer_final_in_for_each: true
    prefer_final_locals: true
    
    # Documentation
    public_member_api_docs: true
    lines_longer_than_80_chars: false # Modern screens allow longer lines
    
    # Clean Code
    avoid_print: true
    avoid_unnecessary_containers: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    
    # Error Handling
    use_build_context_synchronously: true
    
    # Performance
    avoid_function_literals_in_foreach_calls: true
    
    # Disabled for Clean Architecture patterns
    one_member_abstracts: false # Repository interfaces may have single methods
    sort_pub_dependencies: false # Allow organized dependency grouping for readability
