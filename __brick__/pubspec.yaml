name: {{project_name}}
description: {{app_description}}
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Dependency Injection
  get_it: ^7.6.7

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # Functional Programming
  fpdart: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.0.1

  # Typography
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Add your assets here:
  # assets:
  #   - assets/images/
  #   - assets/icons/
