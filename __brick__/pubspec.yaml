name: {{project_name}}
description: A new Flutter project.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Dependency Injection
  get_it: ^7.6.7

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Functional Programming (Either / Option)
  dartz: ^0.10.1

  # Connectivity
  connectivity_plus: ^6.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Add your assets here:
  # assets:
  #   - assets/images/
  #   - assets/icons/

  # Add custom fonts here:
  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf
